<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-9548956702942887">
    <title>AI 챗봇 — o-시리즈</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9548956702942887" crossorigin="anonymous"></script>
</head>
<body class="dark">

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>⚙️ 설정</h2>
            <div class="form-group">
                <label for="api-key-input">OpenAI API Key</label>
                <div class="key-wrapper">
                    <input type="password" id="api-key-input" placeholder="sk-...">
                    <button class="eye-btn" id="eye-btn" title="보기/숨기기">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label for="model-select">모델</label>
                <select id="model-select">
                    <option value="claude-sonnet-4-6">claude-sonnet-4-6 — 최신 고성능</option>
                    <option value="claude-opus-4-6">claude-opus-4-6 — 최고 성능</option>
                    <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 — 빠름</option>
                </select>
            </div>
            <div class="form-group">
                <label for="system-input">시스템 지시 (선택)</label>
                <textarea id="system-input" rows="3" placeholder="예: 당신은 친절한 한국어 AI 어시스턴트입니다."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" id="modal-cancel">취소</button>
                <button class="btn-save" id="modal-save">저장</button>
            </div>
        </div>
    </div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">🤖</span>
                <div>
                    <h1>AI 챗봇</h1>
                    <span class="model-badge" id="model-badge">o4-mini</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="clear-btn" title="대화 초기화">🗑️</button>
                <button class="icon-btn" id="theme-btn" title="테마 변경">☀️</button>
                <button class="icon-btn" id="settings-btn" title="설정">⚙️</button>
            </div>
        </header>

        <!-- Chat area -->
        <main class="chat-area" id="chat-area">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🤖</div>
                <h2>안녕하세요!</h2>
                <p>OpenAI <strong>o-시리즈</strong> AI와 대화해보세요.</p>
                <p class="tip">⚙️ 설정을 눌러 API 키를 먼저 입력해주세요.</p>
                <div class="example-prompts">
                    <button class="example-btn" onclick="useExample(this)">파이썬으로 피보나치 수열 짜줘</button>
                    <button class="example-btn" onclick="useExample(this)">블랙홀을 쉽게 설명해줘</button>
                    <button class="example-btn" onclick="useExample(this)">오늘 할 일 목록 만들어줘</button>
                </div>
            </div>
        </main>

        <!-- Input area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="user-input"
                    placeholder="메시지 입력... (Enter: 전송 / Shift+Enter: 줄바꿈)"
                    rows="1"
                ></textarea>
                <button class="send-btn" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <p class="disclaimer">AI가 실수할 수 있습니다. 중요한 정보는 직접 확인하세요.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
