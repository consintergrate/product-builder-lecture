<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댓글 게시판</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .comments-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 720px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        body.dark .comments-container {
            background-color: #16213e;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .comments-container h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        .comments-container p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }

        body.dark .comments-container p.subtitle {
            color: #aaa;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* 다크모드에서 Disqus iframe 배경 보정 */
        body.dark #disqus_thread {
            background-color: #1e2a45;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <button id="theme-toggle">🌙 Dark Mode</button>
    <div class="comments-container">
        <h1>💬 댓글 게시판</h1>
        <p class="subtitle">자유롭게 의견을 남겨주세요.</p>

        <div id="disqus_thread"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;
                this.page.identifier = 'comments-page';
            };
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://acherm10.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>댓글을 보려면 JavaScript를 활성화해주세요. <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

        <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeToggle.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
        });
    </script>
</body>
</html>
